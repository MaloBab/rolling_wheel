name: rolling_wheel
description: Roues aléatoires pour création de personnages — import/export par groupe.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Persistence locale
  shared_preferences: ^2.2.2

  # Import / Export JSON
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  path_provider: ^2.1.2

  # UI
  google_fonts: ^8.0.2
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

  # Utilitaires
  uuid: ^4.3.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true